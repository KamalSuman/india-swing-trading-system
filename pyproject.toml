[build-system]
requires = ["setuptools>=70"]
build-backend = "setuptools.build_meta"

[project]
name = "india-swing"
version = "0.1.0"
description = "Bias-aware Indian equity swing-trade research and alert pipeline"
readme = "README.md"
requires-python = ">=3.12"
dependencies = []

[project.scripts]
india-swing-demo = "india_swing.demo:main"

[tool.setuptools.packages.find]
where = ["src"]
